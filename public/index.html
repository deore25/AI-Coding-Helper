<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Coding Helper</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <h2>AI Helper</h2>
        <p>VS Code Theme</p>

        <div class="menu">
            <div class="item active">💬 Chat</div>
            <div class="item">🧠 Explain Code</div>
            <div class="item">🐞 Debug</div>
            <div class="item">⚡ Optimize</div>
        </div>
    </aside>

    <main class="main">

        <header class="topbar">
            <span>AI Coding Helper</span>
        </header>

        <section class="chat-box" id="output">
            Welcome! Ask coding questions or paste code.
        </section>

        <section class="input-area">
            <textarea id="userInput" placeholder="Write code or ask anything..."></textarea>
            <button onclick="sendMessage()">Send</button>
        </section>

    </main>

</div>

<script src="script.js"></script>
</body>
</html>
